<div class="min-h-screen flex items-center justify-center bg-gray-800">
  <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">
    <h2 class="text-2xl font-bold text-center mb-6">Register</h2>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-4">
      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Username</mat-label>
        <input matInput formControlName="username" />
        <mat-error>
          <app-form-error [control]="f['username']" />
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Password</mat-label>
        <input matInput type="password" formControlName="password" />
        <mat-error>
          <app-form-error [control]="f['password']" />
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Repeat Password</mat-label>
        <input matInput type="password" formControlName="repeatPassword" />
        <mat-error>
          <app-form-error [control]="f['repeatPassword']" />
        </mat-error>
      </mat-form-field>

      <mat-hint class="text-xs">
        Already have an account?
        <a routerLink="/login" class="ml-1 m text-blue-500 cursor-pointer hover:text-blue-600">
          Login
        </a>
      </mat-hint>

      <button mat-raised-button type="submit" class="w-full mt-5 py-2">Register</button>
    </form>
  </div>
</div>
