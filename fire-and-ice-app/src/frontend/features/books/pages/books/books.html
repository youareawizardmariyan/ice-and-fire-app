<div class="max-w-5xl mx-auto p-4">
  <h1 class="text-3xl font-semibold mb-6">📚 Books</h1>

  @if (loading$ | async) {
    <div class="flex justify-center py-10">
      <mat-spinner></mat-spinner>
    </div>
  }

  @if (!(loading$ | async)) {
    <div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
      @for (book of books$ | async; track $index) {
        <mat-card
          class="rounded-2xl shadow-md hover:shadow-xl transition duration-300 flex flex-col"
        >
          <mat-card-content class="flex-1 flex flex-col gap-2 p-4">
            <h2 class="text-lg font-semibold leading-tight">
              {{ book.name }}
            </h2>

            <p class="text-sm text-gray-500">by {{ book.authors[0] }}</p>

            <p class="text-sm text-gray-700 line-clamp-3">
              {{ book.country }}
            </p>
          </mat-card-content>

          <mat-card-actions class="flex justify-between items-center px-4 pb-4">
            <button mat-icon-button color="accent">
              <mat-icon>favorite_border</mat-icon>
            </button>
          </mat-card-actions>
        </mat-card>
      }
    </div>
  }
</div>
