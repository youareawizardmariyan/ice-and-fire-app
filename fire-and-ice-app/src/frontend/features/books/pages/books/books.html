<h1 class="text-3xl font-semibold mb-6 text-white">📚 Books</h1>

@if (loading()) {
  <div class="flex justify-center py-10">
    <mat-spinner class="spinner" />
  </div>
}

@if (!loading() && filteredBooks().length === 0) {
  <div class="flex flex-col items-center justify-center py-16 text-center text-gray-500">
    <h2 class="text-xl font-semibold text-white">🙅‍♂️ No books found</h2>
  </div>
}

<div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
  @for (book of filteredBooks(); track book.name) {
    <mat-card class="rounded-2xl flex flex-col text-white">
      <mat-card-content class="flex-1 flex flex-col gap-2 p-4">
        <h2 class="text-lg font-semibold leading-tight">
          {{ book.name }}
        </h2>

        <p class="text-sm">by {{ book.authors[0] }}</p>

        <p class="text-sm line-clamp-3">
          {{ book.country }}
        </p>
      </mat-card-content>

      <mat-card-actions class="flex justify-between items-center px-4 pb-4">
        <button (click)="toggleFavorite(book)" mat-icon-button>
          {{ isFavorite(book) ? '❤️' : '🤍' }}
        </button>
      </mat-card-actions>

      <a mat-button [routerLink]="['/books', book.isbn]"> Details </a>
    </mat-card>
  }
</div>
